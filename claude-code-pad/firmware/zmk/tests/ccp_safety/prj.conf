#
# Minimal Kconfig for the ccp_safety unit test. native_sim / native_posix
# host build; no Bluetooth, no RGB underglow, no ADC. The ccp_safety
# code guards RGB and Bluetooth blocks with #if defined(CONFIG_*); since
# neither is enabled on the test build, those sections compile out and
# we do not need to stub the real subsystems.

CONFIG_ZTEST=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096
