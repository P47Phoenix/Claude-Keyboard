#
# Build-time configuration for Claude Code Pad shield. This file is the
# per-build layer on top of Kconfig.defconfig; defconfig sets defaults
# that are DIFFICULT to bypass (hard-cap of RGB brightness), this file
# sets policy options a user may reasonably tune.

# --- Logging -----------------------------------------------------------
# Minimal logging in release builds; bump to LOG_LEVEL_DBG locally.
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# --- BLE ---------------------------------------------------------------
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_BT_DEVICE_NAME="Claude Code Pad"
CONFIG_BT_DEVICE_APPEARANCE=961

# Multi-host: 3 advertised profiles via keymap (BT_SEL 0/1/2).
# BT_MAX_CONN=5 leaves slack for HCI shell + one headroom slot.

# --- RGB ---------------------------------------------------------------
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y

# --- Encoder -----------------------------------------------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Sleep & power -----------------------------------------------------
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# --- Battery reporting (BAS) ------------------------------------------
# The XIAO nRF52840 carrier has VBAT divider on the user-bodged rear-pad
# slot 5 -> P1.11 / AIN7. ccp_battery_guard publishes SoC over BAS.
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Safety guards (project-specific) ----------------------------------
# ccp_battery_guard: undervolt cutoff, LED derate, broken-wire detection.
CONFIG_CCP_BATTERY_GUARD=y
# ccp_thermal_guard: NTC decode, out-of-range -> 100 mA RGB cap.
CONFIG_CCP_THERMAL_GUARD=y
