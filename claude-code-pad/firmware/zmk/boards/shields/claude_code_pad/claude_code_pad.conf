#
# Build-time configuration for Claude Code Pad shield. This file is the
# per-build layer on top of Kconfig.defconfig; defconfig sets defaults
# that are DIFFICULT to bypass (hard-cap of RGB brightness), this file
# sets policy options a user may reasonably tune.

# --- Logging -----------------------------------------------------------
# Minimal logging in release builds; bump to LOG_LEVEL_DBG locally.
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# --- BLE ---------------------------------------------------------------
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_BT_DEVICE_NAME="Claude Code Pad"
CONFIG_BT_DEVICE_APPEARANCE=961

# Connection interval: 7.5 ms minimum leaves headroom for macro typing
# without stuttering across BLE.
# FW-M8 / RED-FW #13: drop peripheral latency from 30 to 10. At the
# 15 ms max interval, latency 30 introduces 450 ms perceived lag on
# idle -> keypress; latency 10 caps that to 150 ms.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=10
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# --- BLE security (SF-B4) ---------------------------------------------
# Require LE Secure Connections (ECDH) + MITM protection. The ZMK
# passkey display uses LED 0/1/2 colour-coded flashes to show the
# six-digit passkey (implementation in Phase 5); for today's build
# this still forces SC + MITM-authenticated pairing, which (lacking
# a display/keyboard) means pairing will only succeed via a host that
# supports "just works with user confirmation" upgrade to SC --
# documented in docs/safety-verification.md. The net effect is that
# a drive-by attacker cannot bond without button-on-device confirm,
# which is what README's §BLE security originally meant.
CONFIG_BT_SMP=y
CONFIG_BT_SMP_SC_PAIR_ONLY=y
CONFIG_BT_SMP_ENFORCE_MITM=y
# SF-M12: only bondable while actively pairing. The shield's pairing-
# mode window will flip this on for 60 s on Fn+BT0 hold (firmware
# TODO -- wired in Phase 3 Cycle 3 keymap work).
CONFIG_BT_BONDABLE=n

# Radio TX power: +4 dBm is the XIAO nRF52840 antenna's happy spot.
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# FW-M7 / RED-FW #11: ZMK 4.1+ uses a single CONFIG_ZMK_HID_REPORT_TYPE_NKRO
# choice symbol for BOTH USB and BLE transports. Setting it here (not
# in Kconfig.defconfig, where `default y` on a choice member has no
# effect) makes NKRO the active report type. Verified against ZMK
# app/Kconfig:64 "choice ZMK_HID_REPORT_TYPE".
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# --- RGB ---------------------------------------------------------------
# CONFIG_ZMK_RGB_UNDERGLOW is set in Kconfig.defconfig (hard cap also
# lives there). Strip and SPI follow. The XIAO nRF52840 board has no
# zmk,ext-power-generic node (the LDO is always on while VBAT is
# present), so we disable the EXT_POWER-aware RGB control path -- the
# LED strip will still be turned on/off via the SPI driver.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y
CONFIG_SPI=y

# --- ADC (required by CCP_BATTERY_GUARD / CCP_THERMAL_GUARD) ----------
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# --- Watchdog (SF-B1) --------------------------------------------------
CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y

# --- Encoder -----------------------------------------------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Sleep & power -----------------------------------------------------
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# --- Battery reporting (BAS) ------------------------------------------
CONFIG_ZMK_BATTERY_REPORTING=y

# --- Safety guards (project-specific) ----------------------------------
CONFIG_CCP_BATTERY_GUARD=y
CONFIG_CCP_THERMAL_GUARD=y
CONFIG_CCP_RGB_INIT_SAFE=y
