# west manifest for the Claude Code Pad user build.
#
# Usage:
#   mkdir -p ~/zmk-ccp && cd ~/zmk-ccp
#   git clone https://github.com/<you>/Claude-Keyboard src/ccp
#   west init -l src/ccp/claude-code-pad/firmware/zmk/config
#   west update
#   west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=claude_code_pad \
#       -DZMK_EXTRA_MODULES="$PWD/src/ccp/claude-code-pad/firmware/zmk"
#
# The last -DZMK_EXTRA_MODULES flag is what lets ZMK find our shield
# definition under boards/shields/claude_code_pad/ without having to
# clone the shield into zmk/app/boards/shields/ itself.
#
# REVISION PINS (Phase 3 Cycle 2 -- RED-FW BLOCKER #15 / FW-M10):
#   zmk  -> 0331b7d16e80954b807917f9323e59ffc1e3b626 (main HEAD 2026-04-15)
#   Zephyr is imported transitively from zmk/app/west.yml which pins
#   zephyrproject-rtos/zephyr @ v4.1.0+zmk-fixes tag -- we do NOT
#   override that here (ZMK tracks Zephyr-with-patches separately and
#   overriding its Zephyr pin breaks the RGB underglow driver).
#
# Bumping pins: update the `revision:` below, rebuild, verify
# ccp_safety still compiles, then amend this header with the new sha.

manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: 0331b7d16e80954b807917f9323e59ffc1e3b626
      import: app/west.yml

  self:
    path: config
